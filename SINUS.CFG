# WeAct H750 -- cift kanal sinus ureteci
# FAT32 SD kartin KOKUNE kopyala, sonra board'a reset at.
# Ayrintili aciklama: README.md
#
# freq_hz  : 0.5 .. 7800   cikis frekansi (Hz)
# amplitude: 0.0 .. 1.0    tam olcegin orani  (0.87 uzeri tepeler yassilasir)
# offset   : 0.0 .. 1.0    salinim merkezi    (0.5 = ~1.65 V)
#
# Bu dosya 1024 bayttan kucuk olmali (su an ~500). Buyurse board dosyayi
# yok sayip gomulu varsayilanlara doner. Uzun aciklamalari README'de tut.

freq_hz   = 1000.0
amplitude = 0.85
offset    = 0.5
