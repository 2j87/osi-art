# WeAct H750 -- osiloskop XY sekil cizici
# FAT32 SD kartin KOKUNE kopyala, sonra board'a reset at.
# Dosya adi 8.3 formatinda olmali: SINUS.CFG olur, uzun ad BULUNAMAZ.
# Ayrintili aciklama: README.md
#
# shape    : ellipse | circle | figure8 | heart | star | rose | butterfly |
#            spiral | gear | elsan | mandala
#            (turkce de olur: elips | cember | sekiz | kalp | yildiz |
#             gul/cicek | kelebek | spiral | disli/cark | elsan/yazi |
#             mandala/spirograf)
# amplitude: 0.0 .. 1.0    cizim boyutu, tam olcegin orani (0.85 iyi baslangic)
# offset   : 0.0 .. 1.0    cizim merkezi  (0.5 = ekran ortasi, ~1.65 V)
# frame_hz : 20 .. 200     saniyedeki cizim tekrari (titremesin diye >= 50)
#
# SD kart yok / bu dosya yoksa gomulu varsayilan devreye girer: yine KALP.
# Bu dosya 1024 bayttan kucuk olmali. Uzun aciklamalari README'de tut.

shape     = heart
amplitude = 0.85
offset    = 0.5
frame_hz  = 60
